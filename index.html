<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Refit Check — Aquaservice</title>

<style>
:root{
  --rood:#df1812;--rood-d:#b01a0a;--rood-l:#fde8e8;
  --navy:#192a67;--blauw:#3d457e;--blauw-l:#eef0f8;
  --grijs:#e6e7e6;--wit:#ffffff;--tekst:#192a67;--mu:#3d457e;--fa:#8a90b0;
  --schaduw:rgba(0,0,0,0.10);--schaduw-h:rgba(0,0,0,0.18);
  --r:16px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--grijs);color:var(--tekst);padding-bottom:40px}

/* Header */
.header{background:var(--navy);padding:20px;display:flex;align-items:center;justify-content:space-between;min-height:70px}
.logo-text{color:#fff;font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:0.5px}
.tel{font-size:12px;color:rgba(255,255,255,0.8);text-decoration:none;font-weight:600;border:1px solid rgba(255,255,255,0.3);padding:6px 12px;border-radius:20px}

.prog-wrap{background:var(--navy);padding:0 20px 15px}
.prog-track{height:4px;background:rgba(255,255,255,0.15);border-radius:4px}
.prog-fill{height:4px;background:var(--rood);border-radius:4px;transition:width .5s ease;width:0%}

.container{max-width:500px;margin:0 auto;padding:25px 16px}
.step{display:none}.step.active{display:block;animation:rise .4s ease-out}
@keyframes rise{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

.eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--rood);margin-bottom:8px}
h1{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.2;color:var(--navy);margin-bottom:20px}

/* Foto Styling */
.q-img{width:100%;height:250px;object-fit:cover;border-radius:var(--r);margin-bottom:25px;box-shadow:var(--schaduw)}

.og{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.ob{background:var(--wit);border:1px solid var(--schaduw);border-radius:var(--r);padding:18px;cursor:pointer;text-align:left;color:var(--tekst);transition:all .2s;font-size:16px;font-weight:500;display:flex;align-items:center;gap:12px}
.ob.sel{border:2px solid var(--rood);background:var(--rood-l);color:var(--rood-d)}

.btn{background:var(--rood);color:#fff;border:none;border-radius:var(--rs);padding:18px;font-size:16px;font-weight:600;cursor:pointer;width:100%;transition:background .2s}
.btn:disabled{background:#ccd1d9;cursor:not-allowed}
.btn-back{background:none;border:none;font-size:13px;color:var(--fa);cursor:pointer;margin-bottom:15px;display:block}

input.f{width:100%;padding:16px;border:2px solid var(--blauw-l);border-radius:var(--rs);font-size:16px;margin-bottom:15px;outline:none;font-family:inherit}

/* Resultaat */
.prijs-kaart{background:var(--wit);border:1px solid var(--schaduw);border-radius:var(--r);padding:20px;margin-bottom:15px}
.spec-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--blauw-l);font-size:14px}
.spec-totaal{display:flex;justify-content:space-between;padding:15px 0;font-weight:700;font-size:18px;color:var(--navy);border-top:2px solid var(--navy);margin-top:10px}
.disclaimer{font-size:11px;color:var(--fa);line-height:1.5;margin-bottom:20px;padding:12px;background:#f9f9f9;border-radius:8px}
